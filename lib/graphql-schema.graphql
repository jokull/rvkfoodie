  eq: String
  neq: String
  gt: String
  lt: String
  gte: String
  lte: String
  exists: Boolean
}

"""Filter for single-reference fields (link, media) by record/asset ID"""
input LinkFilter {
  eq: ItemId
  neq: ItemId
  in: [ItemId!]
  notIn: [ItemId!]
  exists: Boolean
}

"""
Filter for multi-reference fields (links, media_gallery) stored as JSON arrays
"""
input LinksFilter {
  eq: [ItemId!]
  allIn: [ItemId!]
  anyIn: [ItemId!]
  notIn: [ItemId!]
  exists: Boolean
}

"""Filter for geolocation fields"""
input NearFilter {
  latitude: Float!
  longitude: Float!
  radius: Float!
}

input LatLonFilter {
  near: NearFilter
  exists: Boolean
}

"""
Filter for fields that only support existence checks (seo, json, color)
"""
input ExistsFilter {
  exists: Boolean
}

"""Filter records by which locales have content"""
input LocalesFilter {
  allIn: [SiteLocale!]
  anyIn: [SiteLocale!]
  notIn: [SiteLocale!]
}

"""Filter for tree model parent field"""
input ParentFilter {
  eq: ItemId
  exists: Boolean
}

input PositionFilter {
  eq: Int
  neq: Int
  gt: Int
  lt: Int
  gte: Int
  lte: Int
}

