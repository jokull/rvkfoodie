scalar JSON

scalar ItemId

"""Cloudflare Image Resizing transform parameters"""
input ImageTransformParams {
  width: Int
  height: Int
  fit: String
  quality: Int
  format: String
  gravity: String
  dpr: Int
  zoom: Float
  background: String
  blur: Int
  sharpen: Float
  rotate: Int
  anim: Boolean
  trim: ImageTrimParams
}

input ImageTrimParams {
  top: Int
  right: Int
  bottom: Int
  left: Int
  width: Int
  height: Int
}

"""
Legacy DatoCMS/imgix compatibility shim.
Accepted only to smooth migrations; values are translated best-effort to
Cloudflare image transforms and do not imply full imgix parity.
"""
input ImgixParamsShim {
  w: Float
  h: Float
  fit: ImgixFitShim
  auto: [ImgixAutoValueShim!]
  q: Int
  dpr: Float
  blur: Int
  bg: String
  rot: Float
  facepad: Float
  maxW: Int
  maxH: Int
}

enum ImgixFitShim {
  crop
  clip
  fill
  facearea
  scale
  max
}

enum ImgixAutoValueShim {
  format
  compress
}

type Asset {
  id: ID!
  filename: String!
